name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Cache Foundry binaries
        uses: actions/cache@v4
        with:
          path: ~/.ethsmith/bin
          key: foundry-${{ runner.os }}-${{ runner.arch }}-stable-v1

      - name: Install dependencies (postinstall downloads Foundry if not cached)
        run: npm ci

      - name: Run all tests before publish
        run: |
          node test/basic.js
          node test/persistence.js
          node test/highload.js
          node test/crash_recovery.js
          node test/multi_instance.js
          node test/anvil_features.js

      - name: Publish to npm (skip if version already exists)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view ethsmith@$VERSION version 2>/dev/null | grep -q "$VERSION"; then
            echo "ethsmith@$VERSION already on npm — skipping publish"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            lord1egypt/ethsmith:latest
            lord1egypt/ethsmith:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

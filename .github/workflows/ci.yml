name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache Foundry binaries
        uses: actions/cache@v4
        with:
          path: ~/.ethsmith/bin
          key: foundry-${{ runner.os }}-${{ runner.arch }}-stable-v1

      - name: Install dependencies (postinstall downloads Foundry if not cached)
        run: npm ci

      - name: Run unit tests
        run: node test/basic.js

      - name: Run persistence test
        run: node test/persistence.js

      - name: Run highload test
        run: node test/highload.js

      - name: Run multi-instance test
        run: node test/multi_instance.js

      - name: Run Anvil features test
        run: node test/anvil_features.js

      - name: Run crash recovery test
        run: node test/crash_recovery.js
